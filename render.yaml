services:
  - type: web
    name: tsulovpn
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && python app.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMINS
        sync: false
      - key: BOT_NAME
        value: TsuloVPN
      - key: SUBSCRIPTION_PUBLIC_URL
        sync: false
      - key: BYPASS_SOURCE_URL
        value: https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt
      - key: WHITELIST_INCLUDE_ALL
        value: "true"
      - key: WHITELIST_SKIP_HEALTH_CHECK
        value: "true"
      - key: SKIP_HEALTH_CHECK
        value: "false"
      - key: VERIFY_ON_SUBSCRIBE
        value: "true"
      - key: WHITELIST_TCP_ONLY_CHECK
        value: "true"
      - key: WHITELIST_SKIP_VERIFY_ON_SUBSCRIBE
        value: "true"
      - key: WHITELIST_PER_PRIORITY_SNI
        value: "3"
      - key: POOL_REFRESH_INTERVAL
        value: "3600"
      - key: TARGET_REGULAR_COUNT
        value: "20"
      - key: TARGET_WHITELIST_COUNT
        value: "15"
      - key: PYTHON_VERSION
        value: "3.12.8"
